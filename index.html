<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invincible</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h2 {
      margin: 20px 0;
    }

    .grid {
      padding: 20px;
    }

    button {
      margin: 8px;
      padding: 12px 18px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }
  </style>
</head>

<body>

  <h2>Invincible - Episodes</h2>

  <div class="grid">

    <button onclick="openEp(1)">Episode 1</button>
    <button onclick="openEp(2)">Episode 2</button>
    <button onclick="openEp(3)">Episode 3</button>
    <button onclick="openEp(4)">Episode 4</button>
    <button onclick="openEp(5)">Episode 5</button>
    <button onclick="openEp(6)">Episode 6</button>
    <button onclick="openEp(7)">Episode 7</button>
    <button onclick="openEp(8)">Episode 8</button>

  </div>

  <script>
    const base = "https://vidcore.net/tv/tt6741278/1/";

    function openEp(ep) {
      window.open(base + ep, "_blank");
    }
  </script>

</body>
</html>
